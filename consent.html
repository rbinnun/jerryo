<!DOCTYPE html>
<html>
<head>
<title>Jerry — Authorize</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  body { font-family: system-ui; max-width: 400px; margin: 60px auto; padding: 0 20px; color: #333; }
  h1 { font-size: 1.3em; }
  .actions { display: flex; gap: 12px; margin-top: 24px; }
  button { padding: 10px 24px; border-radius: 6px; border: 1px solid #ccc; cursor: pointer; font-size: 1em; }
  .approve { background: #22c55e; color: white; border-color: #22c55e; }
  .deny { background: white; }
  #status { margin-top: 16px; color: #666; }
  .login-form input { display: block; width: 100%; padding: 8px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
</style>
</head>
<body>
  <h1>Authorize access to Jerry</h1>
  <div id="content">Loading...</div>
  <div id="status"></div>
<script>
var sb, authorizationId;

window.addEventListener('DOMContentLoaded', function() {
  try {
    var SUPABASE_URL = 'https://gxrdnfxvclbwmcppsnxl.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4cmRuZnh2Y2xid21jcHBzbnhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDQyODAsImV4cCI6MjA5MDM4MDI4MH0.vlz29-PPczWDL0GvQGXx9PghHJLMx89c7shEd5NdqTQ';
    var params = new URLSearchParams(window.location.search);
    authorizationId = params.get('authorization_id');

    if (!window.supabase) {
      document.getElementById('content').innerHTML = '<p>Error: Supabase library failed to load.</p>';
      return;
    }
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    if (!authorizationId) {
      document.getElementById('content').innerHTML = '<p>Missing authorization_id.</p>';
    } else {
      init();
    }
  } catch(e) {
    document.getElementById('content').innerHTML = '<p>Error: ' + e.message + '</p>';
  }
});

async function init() {
  try {
    // Show login form directly — no session exists on GitHub Pages (different domain from Supabase)
    document.getElementById('content').innerHTML =
      '<p>Log in to approve access.</p>' +
      '<div class="login-form">' +
      '<input type="email" id="email" placeholder="Email">' +
      '<input type="password" id="password" placeholder="Password">' +
      '<button onclick="doLogin()">Log in</button></div>';
  } catch(e) {
    document.getElementById('content').innerHTML = '<p>Error: ' + e.message + '</p>';
  }
}

async function doLogin() {
  var email = document.getElementById('email').value;
  var password = document.getElementById('password').value;
  document.getElementById('status').textContent = 'Logging in...';
  try {
    var result = await sb.auth.signInWithPassword({ email: email, password: password });
    if (result.error) { document.getElementById('status').textContent = result.error.message; return; }
    showConsent();
  } catch(e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
  }
}

async function showConsent() {
  try {
    var result = await sb.auth.oauth.getAuthorizationDetails(authorizationId);
    if (result.error) { document.getElementById('content').innerHTML = '<p>' + result.error.message + '</p>'; return; }
    var name = (result.data.client && result.data.client.name) || 'AI Agent';
    document.getElementById('content').innerHTML =
      '<p><strong>' + name + '</strong> is requesting access to your knowledge graph.</p>' +
      '<div class="actions">' +
      '<button class="approve" onclick="decide(true)">Approve</button>' +
      '<button class="deny" onclick="decide(false)">Deny</button></div>';
  } catch(e) {
    document.getElementById('content').innerHTML = '<p>Error: ' + e.message + '</p>';
  }
}

async function decide(approve) {
  document.getElementById('status').textContent = approve ? 'Approving...' : 'Denying...';
  try {
    var result = approve
      ? await sb.auth.oauth.approveAuthorization(authorizationId)
      : await sb.auth.oauth.denyAuthorization(authorizationId);
    if (result.error) { document.getElementById('status').textContent = result.error.message; return; }
    if (result.data && result.data.redirect_to) { window.location.href = result.data.redirect_to; }
    else { document.getElementById('status').textContent = 'Done. Close this window.'; }
  } catch(e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
  }
}
</script>
</body>
</html>
